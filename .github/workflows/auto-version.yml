name: Auto Version Increment

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'version.json'
      - 'version.md'

jobs:
  increment-version:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Run version increment script
        env:
          GITHUB_SHA: ${{ github.sha }}
        run: node update-version.js

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json version.md
          git commit -m "chore: bump version and update build metadata [skip ci]" || echo "No changes to commit"
          git push origin main
